name: Deploy Image

on:
  workflow_call:
    inputs:
      stable:
        description: "Whether this deploy publishes a stable upstream release"
        required: true
        type: boolean
      version:
        description: "Published image version metadata"
        required: true
        type: string
      tags:
        description: "Newline-delimited image tags to publish"
        required: true
        type: string

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    name: Build and Push
    runs-on: ubuntu-latest
    env:
      BUILD_YTDLP_VERSION: ${{ inputs.stable && inputs.version || 'nightly' }}
      IMAGE_DESCRIPTION: Ready-to-use Docker image for yt-dlp
      IMAGE_VERSION: ${{ inputs.version }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Validate non-stable tags
        if: ${{ !inputs.stable }}
        shell: bash
        env:
          TAGS: ${{ inputs.tags }}
        run: |
          set -euo pipefail

          if printf '%s\n' "${TAGS}" | grep -Eq ':latest$'; then
            echo "Non-stable deploys must not publish the latest tag" >&2
            exit 1
          fi

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            YTDLP_VERSION=${{ env.BUILD_YTDLP_VERSION }}
          tags: ${{ inputs.tags }}
          annotations: |
            index:org.opencontainers.image.description=${{ env.IMAGE_DESCRIPTION }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.description=${{ env.IMAGE_DESCRIPTION }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ env.IMAGE_VERSION }}
